# The main pipeline for ongoing_clinical_trials_analytics

resources:
  pipelines:
    ongoing_clinical_trials_analytics_etl:
      name: ongoing_clinical_trials_analytics_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      root_path: "../src/ongoing_clinical_trials_analytics_etl"

      libraries:
        - glob:
            include: ../src/ongoing_clinical_trials_analytics_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
