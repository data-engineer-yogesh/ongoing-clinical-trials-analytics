# This is a Databricks asset bundle definition for ongoing_clinical_trials_analytics.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: ongoing_clinical_trials_analytics
  uuid: 4748401f-7ff6-4fc2-9626-cf651ae85864

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-fef797ab-c71b.cloud.databricks.com
    variables:
      catalog: clinical_trials_dev
      schema: dev
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://dbc-fef797ab-c71b.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/data.engineer.yogesh@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/data.engineer.yogesh@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: clinical_trials_dev
      schema: prod
    permissions:
      - user_name: data.engineer.yogesh@gmail.com
        level: CAN_MANAGE
